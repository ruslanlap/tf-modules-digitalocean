name: Security

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run Gitleaks (full tree scan)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block tracked secret-like files
        run: |
          set -euo pipefail

          tracked_secret_files="$(
            git ls-files \
              | rg '(^|/)\.env($|\.)|(^|/).+\.pem$|(^|/).+\.key$|(^|/).+\.p12$|(^|/).+\.pfx$|(^|/)id_(rsa|dsa|ecdsa|ed25519)$' \
              || true
          )"

          if [[ -n "${tracked_secret_files}" ]]; then
            echo "Tracked secret-like files detected:"
            echo "${tracked_secret_files}"
            exit 1
          fi
      - name: Block private key material
        run: |
          set -euo pipefail

          key_matches="$(
            rg --line-number --no-heading \
              'BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY' \
              . \
              --glob '!**/.git/**' \
              --glob '!**/.terraform/**' \
              || true
          )"

          if [[ -n "${key_matches}" ]]; then
            echo "Private key material detected:"
            echo "${key_matches}"
            exit 1
          fi
